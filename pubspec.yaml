name: shopsphere
description: "A production-ready Flutter machine test app for browsing products and managing a persisted cart."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
